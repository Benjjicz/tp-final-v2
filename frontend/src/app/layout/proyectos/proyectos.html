<div class="clientes-container">
  <div class="header-actions">
    <h2>Gestión de Proyectos</h2>
    <button class="btn-nuevo" (click)="toggleFormulario()" *ngIf="!mostrarFormulario && !mostrarFormularioEdicion">
      <span class="material-symbols-outlined">add</span> Nuevo Proyecto
    </button>
  </div>

  <div class="formulario-card" *ngIf="mostrarFormulario">
    <h3>Crear Nuevo Proyecto</h3>
    <div class="form-group">
      <label>Nombre del Proyecto:</label>
      <input type="text" [(ngModel)]="nuevoNombre" placeholder="Ej: Rediseño Web Corporativa">
    </div>
    <div class="form-group">
      <label>Asignar Cliente (Opcional):</label>
      <select [(ngModel)]="nuevoIdCliente" class="form-select">
        <option [ngValue]="null">-- Proyecto Interno (Sin Cliente) --</option>
        <option *ngFor="let cliente of clientesActivos" [ngValue]="cliente.id">
          {{ cliente.nombre }}
        </option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn-guardar" (click)="guardarProyecto()"><span class="material-symbols-outlined">save</span> Guardar Proyecto</button>
      <button class="btn-cancelar" (click)="toggleFormulario()"><span class="material-symbols-outlined">close</span> Cancelar</button>
    </div>
  </div>

  <div class="formulario-card" *ngIf="mostrarFormularioEdicion">
    <h3>Editar Proyecto #{{ proyectoEditandoId }}</h3>
    <div class="form-group">
      <label>Nombre:</label>
      <input type="text" [(ngModel)]="editNombre">
    </div>
    <div class="form-group">
      <label>Cliente:</label>
      <select [(ngModel)]="editIdCliente" class="form-select">
        <option [ngValue]="null">-- Proyecto Interno --</option>
        <option *ngFor="let cliente of clientesActivos" [ngValue]="cliente.id">
          {{ cliente.nombre }}
        </option>
      </select>
    </div>
    <div class="form-group">
      <label>Estado:</label>
      <select [(ngModel)]="editEstado" class="form-select">
        <option value="ACTIVO">Activo</option>
        <option value="FINALIZADO">Finalizado</option>
        <option value="BAJA">Baja</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn-guardar" (click)="guardarEdicion()"><span class="material-symbols-outlined">save</span> Actualizar</button>
      <button class="btn-cancelar" (click)="cancelarEdicion()"><span class="material-symbols-outlined">close</span> Cancelar</button>
    </div>
  </div>

  <p *ngIf="cargando" class="mensaje-carga">Cargando proyectos...</p>

  <div class="buscador-container" *ngIf="!cargando">
    <input type="text" 
           [(ngModel)]="terminoBusqueda" 
           placeholder="🔍 Buscar proyecto por nombre..." 
           class="input-buscador">
  </div>

  <table class="tabla-datos" *ngIf="!cargando">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Cliente</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let proy of proyectosFiltrados">
        <td>{{ proy.id }}</td>
        <td>{{ proy.nombre }}</td>
        <td>
          <span *ngIf="proy.cliente" class="badge-proyecto">{{ proy.cliente.nombre }}</span>
          <span *ngIf="!proy.cliente" class="badge-interno">Interno</span>
        </td>
        <td>
          <span class="badge" 
            [ngClass]="{
              'badge-activo': proy.estado === 'ACTIVO', 
              'badge-finalizado': proy.estado === 'FINALIZADO', 
              'badge-baja': proy.estado === 'BAJA'
            }">
            {{ proy.estado }}
          </span>
        </td>
        <td>
          <button class="btn-editar" (click)="abrirEditar(proy)">
            <span class="material-symbols-outlined">edit</span> Editar
          </button>
        </td>
      </tr>
      <tr *ngIf="proyectosFiltrados.length === 0">
        <td colspan="5" style="text-align: center; padding: 20px;">No se encontraron proyectos con ese nombre.</td>
      </tr>
    </tbody>
  </table>
</div>
