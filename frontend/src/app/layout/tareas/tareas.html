<div class="clientes-container">
  <div class="header-actions">
    <h2>Gestión de Tareas</h2>
    <button class="btn-nuevo" (click)="toggleFormulario()" *ngIf="!mostrarFormulario && !mostrarFormularioEdicion">
      + Nueva Tarea
    </button>
  </div>

  <div class="formulario-card" *ngIf="mostrarFormulario">
    <h3>Crear Nueva Tarea</h3>
    <div class="form-group">
      <label>Descripción de la Tarea:</label>
      <input type="text" [(ngModel)]="nuevaDescripcion" placeholder="Ej: Diseñar el logo principal">
    </div>
    <div class="form-group">
      <label>Asignar a Proyecto:</label>
      <select [(ngModel)]="nuevoIdProyecto" class="form-select">
        <option [ngValue]="null">-- Selecciona un Proyecto --</option>
        <option *ngFor="let proy of proyectosActivos" [ngValue]="proy.id">
          {{ proy.nombre }}
        </option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn-guardar" (click)="guardarTarea()">Guardar Tarea</button>
      <button class="btn-cancelar" (click)="toggleFormulario()">Cancelar</button>
    </div>
  </div>

  <div class="formulario-card" *ngIf="mostrarFormularioEdicion">
    <h3>Editar Tarea #{{ tareaEditandoId }}</h3>
    <div class="form-group">
      <label>Descripción:</label>
      <input type="text" [(ngModel)]="editDescripcion">
    </div>
    <div class="form-group">
      <label>Cambiar de Proyecto:</label>
      <select [(ngModel)]="editIdProyecto" class="form-select">
        <option [ngValue]="null">-- Selecciona un Proyecto --</option>
        <option *ngFor="let proy of proyectosActivos" [ngValue]="proy.id">
          {{ proy.nombre }}
        </option>
      </select>
    </div>
    <div class="form-group">
      <label>Estado:</label>
      <select [(ngModel)]="editEstado" class="form-select">
        <option value="PENDIENTE">Pendiente</option>
        <option value="FINALIZADO">Finalizado</option>
        <option value="BAJA">Baja</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn-guardar" (click)="guardarEdicion()">Actualizar</button>
      <button class="btn-cancelar" (click)="cancelarEdicion()">Cancelar</button>
    </div>
  </div>

  <p *ngIf="cargando" class="mensaje-carga">Cargando tareas...</p>

  <table class="tabla-datos" *ngIf="!cargando">
    <thead>
      <tr>
        <th>ID</th>
        <th>Descripción</th>
        <th>Proyecto</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let tarea of tareas">
        <td>{{ tarea.id }}</td>
        <td>{{ tarea.descripcion }}</td>
        <td>
          <span *ngIf="tarea.proyecto" class="badge-proyecto">{{ tarea.proyecto.nombre }}</span>
          <span *ngIf="!tarea.proyecto" class="badge-baja">Sin Proyecto</span>
        </td>
        <td>
          <span class="badge" 
            [ngClass]="{
              'badge-pendiente': tarea.estado === 'PENDIENTE', 
              'badge-finalizado': tarea.estado === 'FINALIZADO', 
              'badge-baja': tarea.estado === 'BAJA'
            }">
            {{ tarea.estado }}
          </span>
        </td>
        <td class="acciones-cell">
          <button class="btn-editar" (click)="abrirEditar(tarea)">Editar</button>
          <button class="btn-eliminar" (click)="eliminarTarea(tarea.id)">Borrar</button>
        </td>
      </tr>
      <tr *ngIf="tareas.length === 0">
        <td colspan="5" style="text-align: center; padding: 20px;">No hay tareas registradas.</td>
      </tr>
    </tbody>
  </table>
</div>
